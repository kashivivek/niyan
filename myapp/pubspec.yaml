name: myapp
description: "A property management application built with Flutter and Firebase."

publish_to: 'none'

version: 1.1.0+2

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_app_check: ^0.3.2+10
  firebase_storage: ^12.4.4

  # State Management
  provider: ^6.1.2

  # UI & Fonts
  google_fonts: ^6.3.3
  cupertino_icons: ^1.0.6
  fl_chart: ^0.68.0
  uuid: ^4.4.0
  intl: ^0.19.0
  image_picker: ^1.2.1
  url_launcher: ^6.3.2
  async: ^2.13.0
  rxdart: ^0.28.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  mockito: ^5.6.1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/google_fonts/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logo_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#ffffff"
  image: "assets/images/logo_icon.png"
  android_12:
    image: "assets/images/logo_icon.png"
    color: "#ffffff"

